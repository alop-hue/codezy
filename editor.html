    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #container {
            display: flex;
            flex-direction: column;
        }
        .editor {
            width: 100%;
            height: 600px;
            border: 1px solid rgb(46, 33, 33);
            margin-bottom: 10px;
            display: none;
        }
        .editor.active {
            display: block;
        }
        #head {
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-bottom: 10px;
        }
        body {
            margin: 0;
            font-family: 'Cairo', Arial, sans-serif;
            background-color: #252526;
            color: white;
        }
        button, select {
            margin: 5px;
            padding: 5px 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 7px;
        }
        button:hover, select:hover {
            background-color: #1177bb;
        }
        .tab-btn {
            background-color: #3c3c3c;
            margin-right: 2px;
            padding: 5px 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border-radius: 5px;
        }
        .tab-btn.active {
            background-color: #007acc;
        }
        .close-btn {
            background-color: transparent;
            color: white;
            border: none;
            padding: 0;
            margin: 0;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            border-radius: 50%;
        }
        .close-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        /* Additional theme styles */
        .theme-dark {
            background-color: #1e1e1e;
            color: white;
        }
        .theme-light {
            background-color: #ffffff;
            color: black;
        }
        .theme-high-contrast {
            background-color: #000000;
            color: #ffffff;
        }
        .monaco-editor .cursor {
    background-color: #00ff88 !important;
}
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: #1a1a1a;
}

::-webkit-scrollbar-thumb {
    background: #00ff88;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #00cc66;
}

body.light-mode ::-webkit-scrollbar-track {
    background: #e0e0e0;
}#monacoEditor,
#monacoEditor * {
    color: inherit !important;
}

    </style>
</head>

    <div class="container" style="padding:20px;">
    <h1 id="head">Codezy المحرر</h1>
    <div style="margin-bottom:12px;">
    <button onclick="run()">تشغيل</button>
    <button onclick="save()">حفظ</button>
    <button onclick="load()">تحميل</button>
    <select id="theme-selector">
        <option value="vs-dark">داكن</option>
        <option value="vs-light">فاتح</option>
        <option value="hc-black">تباين عالي </option>
    </select>
    <select id="language-selector">
        <option value="html">HTML</option>
        <option value="javascript">JavaScript</option>
        <option value="css">CSS</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="csharp">C#</option>
        <option value="cpp">C++</option>
        <option value="ruby">Ruby</option>
        <option value="php">PHP</option>
        <option value="typescript">TypeScript</option>
    </select>
    <div id="file-tabs" style="margin:10px 0;"></div>
    <div id="container"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs/loader.min.js"></script>
    <script>
        let editors = [];
        let currentFileIndex = 0;
        let files = [];

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            files.push({ name: 'index.html', content: '' });
            addNewEditor('index.html');
            updateFileTabs();
            switchFile(0);
        });

        document.getElementById('language-selector').addEventListener('change', function() {
            if (editors[currentFileIndex]) {
                monaco.editor.setModelLanguage(editors[currentFileIndex].getModel(), this.value);
            }
        });

        document.getElementById('theme-selector').addEventListener('change', function() {
            const selectedTheme = this.value;
            monaco.editor.setTheme(selectedTheme);
            document.body.className = selectedTheme === 'vs-dark' ? 'theme-dark' : selectedTheme === 'vs-light' ? 'theme-light' : 'theme-high-contrast';
        });

        function run() {
            try {
                const code = editors[currentFileIndex].getValue();
                const newWindow = window.open();
                if (newWindow) {
                    newWindow.document.write(code);
                    newWindow.document.close();
                } else {
                    console.error('Failed to open new window. Please check your browser settings.');
                }
            } catch (error) {
                console.error('Error running code:', error);
            }
        }

        function save() {
            if (editors[currentFileIndex]) {
                files[currentFileIndex].content = editors[currentFileIndex].getValue();
                const code = files[currentFileIndex].content;
                const filename = files[currentFileIndex].name;
                const element = document.createElement('a');
                element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(code));
                element.setAttribute('download', filename);
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            }
        }

        function load() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.html,.js,.css,.txt';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    editors[currentFileIndex].setValue(event.target.result);
                    document.title = file.name;
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function addNewFile() {
            const filename = prompt('Enter filename:', 'file' + (files.length + 1) + '.html');
            if (filename) {
                files.push({ name: filename, content: '' });
                addNewEditor(filename);
                updateFileTabs();
                switchFile(files.length - 1);
            }
        }

        function closeFile(index) {
            if (files.length === 1) {
                alert('Cannot close the last file!');
                return;
            }
            editors[index].dispose();
            editors.splice(index, 1);
            files.splice(index, 1);
            
            if (currentFileIndex >= files.length) {
                currentFileIndex = files.length - 1;
            }
            
            updateFileTabs();
            switchFile(currentFileIndex);
        }

        function addNewEditor(filename) {
            const editorContainer = document.createElement('div');
            editorContainer.className = 'editor active';
            document.getElementById('container').appendChild(editorContainer);
            const editor = monaco.editor.create(editorContainer, {
                language: document.getElementById('language-selector').value,
                theme: document.getElementById('theme-selector').value,
                automaticLayout: true
            });
            editors.push(editor);
        }

        function switchFile(index) {
            if (currentFileIndex < files.length && editors[currentFileIndex]) {
                files[currentFileIndex].content = editors[currentFileIndex].getValue();
                editors[currentFileIndex].getContainerDomNode().classList.remove('active');
            }
            currentFileIndex = index;
            if (editors[currentFileIndex]) {
                editors[currentFileIndex].setValue(files[index].content);
                editors[currentFileIndex].getContainerDomNode().classList.add('active');
            }
            document.title = files[index].name;
            updateFileTabs();
        }

        function updateFileTabs() {
            let tabsHtml = '';
            files.forEach((file, i) => {
                const activeClass = i === currentFileIndex ? 'active' : '';
                tabsHtml += `<button class="tab-btn ${activeClass}" onclick="switchFile(${i})">${file.name}<button class="close-btn" onclick="event.stopPropagation(); closeFile(${i})">×</button></button>`;
            });
            tabsHtml += '<button class="tab-btn" onclick="addNewFile()">+ New File</button>';
            document.getElementById('file-tabs').innerHTML = tabsHtml;
        }

    </script>
